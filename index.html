<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WorkSpace"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="description" content="WorkSpace 共同協作平台"/>
  <title>WorkSpace</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body,#root{height:100%;background:#0a0a0a;}
    body{-webkit-tap-highlight-color:transparent;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // localStorage shim for window.storage API
    window.storage = {
      get: async (key) => {
        const v = localStorage.getItem(key);
        if (v === null) throw new Error("Key not found: " + key);
        return { key, value: v };
      },
      set: async (key, value) => {
        localStorage.setItem(key, value);
        return { key, value };
      },
      delete: async (key) => {
        localStorage.removeItem(key);
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const keys = Object.keys(localStorage).filter(k => prefix ? k.startsWith(prefix) : true);
        return { keys };
      }
    };

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('SW registered');
        }).catch(err => console.log('SW failed:', err));
      });
    }
  </script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const COLORS = [
  { bg:"#3b82f6" },{ bg:"#22c55e" },{ bg:"#ef4444" },
  { bg:"#f97316" },{ bg:"#a855f7" },{ bg:"#ec4899" },
];
const STATUS_MAP = {
  todo:  { label:"待開始", color:"#64748b" },
  doing: { label:"進行中", color:"#3b82f6" },
  done:  { label:"已完成", color:"#22c55e" },
};
const KEYS = { CAL:"ws-cal-v3", GANTT:"ws-gantt-v3", KANBAN:"ws-kanban-v3", NOTES:"ws-notes-v3" };

const dim  = (y,m) => new Date(y,m+1,0).getDate();
const fd   = (y,m) => new Date(y,m,1).getDay();
const dKey = (y,m,d) => y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
const tStr = () => new Date().toISOString().slice(0,10);
const addD = (s,n) => { const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const dbw  = (a,b) => Math.round((new Date(b)-new Date(a))/864e5);
const uid  = () => Date.now()+"-"+Math.random().toString(36).slice(2);
const fmt  = n => Number(n||0).toLocaleString("zh-TW",{maximumFractionDigits:0});

function useShared(key, def) {
  const [val,set]=useState(def),[sync,setSy]=useState(false),[last,setLa]=useState(null),[loaded,setLd]=useState(false);
  const load=useCallback(async()=>{
    try{const r=await window.storage.get(key,true);if(r&&r.value){set(JSON.parse(r.value));setLd(true);return;}}catch(_){}
    try{const v=window.localStorage.getItem(key);if(v)set(JSON.parse(v));}catch(_){}
    setLd(true);
  },[key]);
  const save=useCallback(async(v)=>{
    setSy(true);
    try{window.localStorage.setItem(key,JSON.stringify(v));}catch(_){}
    try{await window.storage.set(key,JSON.stringify(v),true);setLa(new Date());}catch(_){setLa(new Date());}
    finally{setSy(false);}
  },[key]);
  useEffect(()=>{load();const t=setInterval(load,15000);return()=>clearInterval(t);},[load]);
  return [val,set,save,sync,last,loaded];
}

const NavBtn=({onClick,children})=>(<button onClick={onClick} style={{width:34,height:34,borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#e2e8f0",fontSize:16,cursor:"pointer"}}>{children}</button>);
const Btn=({onClick,children,variant="primary",small,style:s={}})=>(<button onClick={onClick} style={{padding:small?"5px 11px":"8px 16px",borderRadius:8,border:variant==="ghost"?"1px solid rgba(255,255,255,0.1)":"none",background:variant==="primary"?"#3b82f6":variant==="danger"?"rgba(239,68,68,0.12)":"transparent",color:variant==="danger"?"#f87171":variant==="ghost"?"rgba(255,255,255,0.5)":"#fff",fontSize:small?11:13,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif",whiteSpace:"nowrap",...s}}>{children}</button>);
const Inp=({style,...p})=>(<input style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 11px",color:"#e2e8f0",fontSize:13,fontFamily:"'Noto Sans TC',sans-serif",outline:"none",width:"100%",...style}} {...p}/>);
const Sel=({style,...p})=>(<select style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 11px",color:"#e2e8f0",fontSize:13,fontFamily:"'Noto Sans TC',sans-serif",outline:"none",width:"100%",...style}} {...p}/>);
const Card=({children,style})=>(<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,...style}}>{children}</div>);
const SBadge=({status,onClick})=>{const s=STATUS_MAP[status]||STATUS_MAP.todo;return <span onClick={onClick} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:s.color+"28",color:s.color,fontFamily:"monospace",whiteSpace:"nowrap",cursor:onClick?"pointer":"default"}}>{s.label}</span>;};
const ColorPick=({value,onChange})=>(<div style={{display:"flex",gap:7,alignItems:"center"}}><span style={{fontSize:11,color:"rgba(255,255,255,0.35)",fontFamily:"monospace"}}>顏色</span>{COLORS.map((c,i)=><div key={i} onClick={()=>onChange(i)} style={{width:20,height:20,borderRadius:"50%",background:c.bg,border:value===i?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}</div>);
function BudgetMini({budget,expenses}){
  const s=(expenses||[]).reduce((a,e)=>a+Number(e.amount||0),0),b=Number(budget||0);
  if(b===0&&s===0)return null;
  const p=b>0?Math.min(Math.round(s/b*100),100):0,over=s>b&&b>0;
  return(<div style={{marginTop:3}}><div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:p+"%",background:over?"#ef4444":p>=80?"#f97316":"#22c55e",borderRadius:2}}/></div><div style={{fontFamily:"monospace",fontSize:9,color:over?"#f87171":"rgba(255,255,255,0.3)",marginTop:1}}>{"\u{1F4B0} "+p+"% "+(over?"超支！":"已用")}</div></div>);
}

const EMPTY_GANTT=()=>({name:"",owner:"",start:tStr(),end:addD(tStr(),6),status:"todo",color:0,progress:0,note:"",budget:"",expenses:[],manpower:[]});
function GanttView({tasks,onSave}){
  const [showForm,setShowForm]=useState(false),[editId,setEditId]=useState(null);
  const [gs,setGs]=useState(()=>{const d=new Date();d.setDate(1);return d.toISOString().slice(0,10);});
  const [form,setForm]=useState(EMPTY_GANTT()),[expForm,setExpForm]=useState({date:tStr(),amount:"",note:""});
  const [mpForm,setMpForm]=useState({name:"",hours:"",reason:""}),[detailId,setDetailId]=useState(null);
  const DAYS=42,COL=28,LW=160,dayList=Array.from({length:DAYS},(_,i)=>addD(gs,i)),td=tStr();
  const sect={fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:4,marginTop:2};
  const openAdd=()=>{setEditId(null);setForm(EMPTY_GANTT());setExpForm({date:tStr(),amount:"",note:""});setMpForm({name:"",hours:"",reason:""});setShowForm(true);};
  const openEdit=t=>{setEditId(t.id);setForm({name:t.name,owner:t.owner||"",start:t.start,end:t.end,status:t.status,color:t.color||0,progress:t.progress||0,note:t.note||"",budget:t.budget||"",expenses:t.expenses||[],manpower:t.manpower||[]});setExpForm({date:tStr(),amount:"",note:""});setMpForm({name:"",hours:"",reason:""});setShowForm(true);};
  const addExpense=()=>{if(!expForm.amount)return;setForm(f=>({...f,expenses:[...f.expenses,{id:uid(),date:expForm.date,amount:parseFloat(expForm.amount)||0,note:expForm.note}]}));setExpForm({date:tStr(),amount:"",note:""});};
  const delExpense=id=>setForm(f=>({...f,expenses:f.expenses.filter(e=>e.id!==id)}));
  const addMp=()=>{if(!mpForm.name||!mpForm.hours)return;setForm(f=>({...f,manpower:[...f.manpower,{id:uid(),name:mpForm.name,hours:parseFloat(mpForm.hours)||0,reason:mpForm.reason||""}]}));setMpForm({name:"",hours:"",reason:""});};
  const delMp=id=>setForm(f=>({...f,manpower:f.manpower.filter(m=>m.id!==id)}));
  const submit=async()=>{
    if(!form.name.trim()||!form.start||!form.end)return;
    const spent=form.expenses.reduce((a,e)=>a+Number(e.amount||0),0);
    const upd=editId?tasks.map(t=>t.id===editId?{...t,...form,spent}:t):[...tasks,{id:uid(),...form,spent,createdAt:new Date().toISOString()}];
    await onSave(upd);setShowForm(false);setEditId(null);
  };
  const del=async id=>onSave(tasks.filter(t=>t.id!==id));
  const cycle=async id=>{const ord=["todo","doing","done"];await onSave(tasks.map(t=>t.id!==id?t:{...t,status:ord[(ord.indexOf(t.status)+1)%ord.length]}));};
  const sorted=[...tasks].sort((a,b)=>a.start.localeCompare(b.start));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <NavBtn onClick={()=>setGs(s=>addD(s,-7))}>&#8249;</NavBtn>
          <span style={{fontFamily:"monospace",fontSize:12,color:"rgba(255,255,255,0.4)"}}>{gs.slice(0,7)}</span>
          <NavBtn onClick={()=>setGs(s=>addD(s,7))}>&#8250;</NavBtn>
          <Btn onClick={()=>setGs(td.slice(0,8)+"01")} small variant="ghost">今天</Btn>
        </div>
        <Btn onClick={openAdd}>＋ 新增任務</Btn>
      </div>
      {showForm&&(
        <Card style={{padding:16,marginBottom:14,display:"flex",flexDirection:"column",gap:10}}>
          <div style={sect}>{editId?"編輯任務":"新增任務"}</div>
          <Inp placeholder="任務名稱 *" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          <Inp placeholder="負責人" value={form.owner} onChange={e=>setForm(f=>({...f,owner:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><div style={sect}>開始</div><Inp type="date" value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))}/></div>
            <div><div style={sect}>結束</div><Inp type="date" value={form.end} onChange={e=>setForm(f=>({...f,end:e.target.value}))}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><div style={sect}>狀態</div><Sel value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{Object.entries(STATUS_MAP).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</Sel></div>
            <div><div style={sect}>{"進度 "+form.progress+"%"}</div><input type="range" min={0} max={100} step={5} value={form.progress} onChange={e=>setForm(f=>({...f,progress:+e.target.value}))} style={{width:"100%",accentColor:"#3b82f6",marginTop:8}}/></div>
          </div>
          <ColorPick value={form.color} onChange={v=>setForm(f=>({...f,color:v}))}/>
          <Inp placeholder="備註" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
          <div style={{height:1,background:"rgba(255,255,255,0.07)"}}/>
          <div style={sect}>預算 (NT$)</div>
          <Inp type="number" placeholder="0" value={form.budget} onChange={e=>setForm(f=>({...f,budget:e.target.value}))}/>
          <div style={sect}>花費明細</div>
          {form.expenses.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:4}}>
              {form.expenses.map(e=>(
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"7px 10px"}}>
                  <span style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.4)",flexShrink:0}}>{e.date}</span>
                  <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#f97316",flexShrink:0}}>{"NT$ "+fmt(e.amount)}</span>
                  {e.note&&<span style={{fontSize:11,color:"rgba(255,255,255,0.4)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</span>}
                  <Btn onClick={()=>delExpense(e.id)} variant="danger" small>X</Btn>
                </div>
              ))}
              <div style={{fontFamily:"monospace",fontSize:11,color:"#f97316",textAlign:"right"}}>{"合計 NT$ "+fmt(form.expenses.reduce((a,e)=>a+Number(e.amount||0),0))}</div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr auto",gap:6,alignItems:"center"}}>
            <Inp type="date" value={expForm.date} onChange={e=>setExpForm(f=>({...f,date:e.target.value}))} style={{fontSize:11,padding:"6px 8px"}}/>
            <Inp type="number" placeholder="金額" value={expForm.amount} onChange={e=>setExpForm(f=>({...f,amount:e.target.value}))} style={{fontSize:12}}/>
            <Inp placeholder="說明" value={expForm.note} onChange={e=>setExpForm(f=>({...f,note:e.target.value}))} style={{fontSize:12}}/>
            <Btn onClick={addExpense} small>+</Btn>
          </div>
          <div style={{height:1,background:"rgba(255,255,255,0.07)"}}/>
          <div style={sect}>人力工數</div>
          {form.manpower.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:4}}>
              {form.manpower.map(m=>(
                <div key={m.id} style={{display:"flex",alignItems:"flex-start",gap:8,background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:500}}>{m.name}</span><span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#a855f7"}}>{m.hours+" 小時"}</span></div>
                    {m.reason&&<div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{m.reason}</div>}
                  </div>
                  <Btn onClick={()=>delMp(m.id)} variant="danger" small>X</Btn>
                </div>
              ))}
              <div style={{fontFamily:"monospace",fontSize:11,color:"#a855f7",textAlign:"right"}}>{"合計 "+form.manpower.reduce((a,m)=>a+Number(m.hours||0),0)+" 人時"}</div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:6}}>
              <Inp placeholder="人員名稱 *" value={mpForm.name} onChange={e=>setMpForm(f=>({...f,name:e.target.value}))} style={{fontSize:12}}/>
              <Inp type="number" placeholder="小時" value={mpForm.hours} onChange={e=>setMpForm(f=>({...f,hours:e.target.value}))} style={{fontSize:12}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:6}}>
              <Inp placeholder="事由" value={mpForm.reason} onChange={e=>setMpForm(f=>({...f,reason:e.target.value}))} style={{fontSize:12}}/>
              <Btn onClick={addMp} small>+</Btn>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <Btn onClick={submit} style={{flex:1}}>{editId?"儲存":"新增"}</Btn>
            <Btn onClick={()=>{setShowForm(false);setEditId(null);}} variant="ghost">取消</Btn>
          </div>
        </Card>
      )}
      {tasks.length===0&&!showForm&&<div style={{textAlign:"center",padding:"36px 0",color:"rgba(255,255,255,0.2)",fontFamily:"monospace",fontSize:13}}>還沒有任務，點 新增任務 開始</div>}
      {tasks.length>0&&(
        <div style={{overflowX:"auto"}}>
          <div style={{minWidth:LW+COL*DAYS}}>
            <div style={{display:"flex",marginBottom:6,borderBottom:"1px solid rgba(255,255,255,0.06)",paddingBottom:4}}>
              <div style={{width:LW,flexShrink:0}}/>
              <div style={{display:"flex"}}>
                {dayList.map(d=>{const isT=d===td,dt=new Date(d),dow=dt.getDay();return(
                  <div key={d} style={{width:COL,flexShrink:0,textAlign:"center",fontFamily:"monospace",fontSize:9,color:isT?"#60a5fa":dow===0||dow===6?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.28)",background:isT?"rgba(59,130,246,0.1)":"transparent",borderRadius:3,padding:"1px 0"}}>
                    {dt.getDate()===1&&<div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>{(dt.getMonth()+1)+"月"}</div>}
                    {dt.getDate()}
                  </div>
                );})}
              </div>
            </div>
            {sorted.map(task=>{
              const clr=COLORS[task.color]?.bg||"#3b82f6";
              const so=dbw(gs,task.start),barL=Math.max(so,0)*COL,clipL=so<0?-so*COL:0;
              const vis=Math.min(Math.max(dbw(task.start,task.end)+1,1)+Math.min(so,0),DAYS-Math.max(so,0));
              const barW=Math.max(vis,0)*COL,tdI=dayList.indexOf(td);
              const spent=(task.expenses||[]).reduce((a,e)=>a+Number(e.amount||0),0);
              const totalMp=(task.manpower||[]).reduce((a,m)=>a+Number(m.hours||0),0);
              const isDetail=detailId===task.id;
              return(
                <div key={task.id} style={{marginBottom:isDetail?12:6}}>
                  <div style={{display:"flex",alignItems:"flex-start",minHeight:72}}>
                    <div style={{width:LW,flexShrink:0,paddingRight:8,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}} onClick={()=>openEdit(task)}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:clr,flexShrink:0,display:"inline-block"}}/>
                        <span style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{task.name}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginTop:2,flexWrap:"wrap"}}>
                        <SBadge status={task.status} onClick={()=>cycle(task.id)}/>
                        {task.owner&&<span style={{fontSize:9,color:"rgba(255,255,255,0.28)",fontFamily:"monospace"}}>{task.owner}</span>}
                      </div>
                      <BudgetMini budget={task.budget} expenses={task.expenses}/>
                      <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                        {totalMp>0&&<span style={{fontFamily:"monospace",fontSize:9,color:"#a855f7",background:"rgba(168,85,247,0.12)",borderRadius:4,padding:"1px 5px"}}>{totalMp+"人時"}</span>}
                        {spent>0&&<span style={{fontFamily:"monospace",fontSize:9,color:"#f97316",background:"rgba(249,115,22,0.12)",borderRadius:4,padding:"1px 5px"}}>{fmt(spent)}</span>}
                        {((task.expenses||[]).length>0||(task.manpower||[]).length>0)&&(
                          <span onClick={()=>setDetailId(isDetail?null:task.id)} style={{fontFamily:"monospace",fontSize:9,color:"#60a5fa",background:"rgba(96,165,250,0.1)",borderRadius:4,padding:"1px 5px",cursor:"pointer"}}>{isDetail?"收起":"明細"}</span>
                        )}
                      </div>
                    </div>
                    <div style={{position:"relative",height:72,flex:1,overflow:"visible"}}>
                      {barW>0&&(
                        <div style={{position:"absolute",top:28,left:barL-clipL,width:barW,height:26,borderRadius:6,background:clr+"35",border:"1px solid "+clr+"55",overflow:"hidden"}}>
                          <div style={{position:"absolute",top:0,left:0,height:"100%",width:(task.progress||0)+"%",background:clr+"70",borderRadius:6}}/>
                          {barW>44&&<div style={{position:"absolute",top:"50%",left:6,transform:"translateY(-50%)",fontSize:10,fontFamily:"monospace",color:"#fff",whiteSpace:"nowrap"}}>{(task.progress||0)>0?(task.progress+"%"):""}</div>}
                        </div>
                      )}
                      {(task.expenses||[]).map((e,ei)=>{
                        const eI=dayList.indexOf(e.date);if(eI<0)return null;
                        const labelL=eI*COL+COL/2,topOffset=ei%2===0?2:14,pinH=28-topOffset;
                        return(
                          <div key={e.id} style={{position:"absolute",left:labelL,top:topOffset,transform:"translateX(-50%)",zIndex:10,pointerEvents:"none"}}>
                            <div style={{position:"absolute",left:"50%",top:"100%",width:1.5,height:pinH,background:"#f97316",opacity:0.7,transform:"translateX(-50%)"}}/>
                            <div style={{background:"#1a1200",border:"1px solid #f97316",borderRadius:6,padding:"2px 6px",whiteSpace:"nowrap",display:"flex",flexDirection:"column",alignItems:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.6)"}}>
                              <span style={{fontFamily:"monospace",fontSize:8,color:"rgba(255,183,77,0.7)",lineHeight:1.2}}>{e.date.slice(5)}</span>
                              <span style={{fontFamily:"monospace",fontSize:10,fontWeight:700,color:"#f97316",lineHeight:1.3}}>{"$"+fmt(e.amount)}</span>
                              {e.note&&<span style={{fontSize:8,color:"rgba(255,255,255,0.45)",lineHeight:1.2,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis"}}>{e.note}</span>}
                            </div>
                          </div>
                        );
                      })}

// CALENDAR
const HOUR_H=64;
const hhmm=(h,m=0)=>String(h).padStart(2,"0")+":"+String(m||0).padStart(2,"0");
const toDecH=s=>{const [h,m]=(s||"0:0").split(":").map(Number);return h+m/60;};
const decHToY=h=>h*HOUR_H;
const snapH=h=>Math.round(h*4)/4;
const EMPTY_EVT=()=>({title:"",timeStart:"09:00",timeEnd:"10:00",color:0,author:"",note:"",location:"",remind:"0",allDay:false,repeat:"none",repeatDow:1,repeatDom:1,repeatWeek:1,repeatEndType:"never",repeatEndDate:"",repeatEndCount:10});

function getEventsForDay(events,recurring,dk){
  const d=new Date(dk),dow=d.getDay(),dom=d.getDate();
  const wk=Math.ceil(dom/7),dIM=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(),isLast=dom+7>dIM;
  const direct=events[dk]||[];
  const rec=recurring.filter(r=>{
    if(r.repeatEndType==="date"&&r.repeatEndDate&&dk>r.repeatEndDate)return false;
    if(r.repeatEndType==="count"&&r.repeatEndCount>0){
      const created=(r.createdAt||"").slice(0,10)||dk;let cnt=0;
      for(let cur=new Date(created);cur<=new Date(dk);cur.setDate(cur.getDate()+1)){
        const cdow=cur.getDay(),cdom=cur.getDate(),cwk=Math.ceil(cdom/7);
        const cdIM=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate(),cisl=cdom+7>cdIM;
        if(r.repeat==="daily")cnt++;
        else if(r.repeat==="weekly"&&r.repeatDow===cdow)cnt++;
        else if(r.repeat==="monthly"&&r.repeatDom===cdom)cnt++;
        else if(r.repeat==="monthly-weekday"&&r.repeatDow===cdow){if(r.repeatWeek===-1&&cisl)cnt++;else if(r.repeatWeek===cwk)cnt++;}
        if(cnt>10000)break;
      }
      if(cnt>r.repeatEndCount)return false;
    }
    if(r.repeat==="daily")return true;
    if(r.repeat==="weekly")return r.repeatDow===dow;
    if(r.repeat==="monthly")return r.repeatDom===dom;
    if(r.repeat==="monthly-weekday"){if(r.repeatDow!==dow)return false;return r.repeatWeek===-1?isLast:r.repeatWeek===wk;}
    return false;
  }).map(r=>({...r,isRecurring:true}));
  return [...direct,...rec].sort((a,b)=>(a.timeStart||"99")>(b.timeStart||"99")?1:-1);
}

function CalendarView({events,onSave}){

  useEffect(()=>{
    const check=()=>{
      const n=new Date(),tk=dKey(n.getFullYear(),n.getMonth(),n.getDate());
      getEventsForDay(events,recurring,tk).forEach(evt=>{
        if(!evt.timeStart||!evt.remind||evt.remind==="0")return;
        const [h,m]=evt.timeStart.split(":").map(Number);
        const et=new Date();et.setHours(h,m,0,0);
        const diff=et-n,ms=parseInt(evt.remind)*60000,fk=evt.id+"-"+evt.remind;

      });
    };

  const nextMonth=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};

// BUDGET
function BudgetView({tasks}){
  const twb=tasks.filter(t=>Number(t.budget||0)>0||(t.expenses||[]).length>0);
  const totB=tasks.reduce((a,t)=>a+Number(t.budget||0),0);
  const totS=tasks.reduce((a,t)=>a+(t.expenses||[]).reduce((b,e)=>b+Number(e.amount||0),0),0);
  const rem=totB-totS,pct=totB>0?Math.min(Math.round(totS/totB*100),100):0,over=rem<0&&totB>0;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card style={{padding:18}}>
        <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:14}}>整體預算總覽</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[{label:"總預算",val:totB,color:"#e2e8f0"},{label:"已花費",val:totS,color:"#f97316"},{label:"剩餘",val:Math.abs(rem),color:over?"#ef4444":"#22c55e",prefix:over?"-":""}].map(({label,val,color,prefix=""})=>(
            <div key={label} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px",overflow:"hidden",minWidth:0}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace",marginBottom:3}}>{label}</div>
              <div style={{fontFamily:"monospace",fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:1}}>NT$</div>
              <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prefix+fmt(val)}</div>
            </div>
          ))}
        </div>
        <div style={{height:16,background:"rgba(255,255,255,0.07)",borderRadius:8,overflow:"hidden",marginBottom:8}}>
          <div style={{height:"100%",width:pct+"%",background:over?"#ef4444":pct>=80?"#f97316":"#3b82f6",borderRadius:8,transition:"width 0.8s ease",display:"flex",alignItems:"center",justifyContent:"flex-end"}}>
            {pct>12&&<span style={{fontFamily:"monospace",fontSize:11,color:"#fff",fontWeight:700,paddingRight:8}}>{pct+"%"}</span>}
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.35)"}}>
          <span>{over?"超支！":"已使用 "+pct+"%"}</span><span>{twb.length+" 個項目有預算"}</span>
        </div>
      </Card>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}><span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#93c5fd"}}>各項目預算明細</span></div>
        <div style={{padding:"8px 12px"}}>
          {twb.length===0&&<div style={{padding:"28px 0",textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:12,fontFamily:"monospace"}}>尚未設定預算，前往甘特圖新增</div>}
          {twb.map(task=>{
            const b=Number(task.budget||0),s=(task.expenses||[]).reduce((a,e)=>a+Number(e.amount||0),0);
            const r=b-s,p=b>0?Math.min(Math.round(s/b*100),100):0,ov=s>b&&b>0;
            const clr=COLORS[task.color]?.bg||"#3b82f6",barC=ov?"#ef4444":p>=80?"#f97316":clr;
            return(
              <div key={task.id} style={{padding:"12px 8px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{width:8,height:8,borderRadius:"50%",background:clr,display:"inline-block",flexShrink:0}}/><span style={{fontSize:13,fontWeight:500}}>{task.name}</span>{task.owner&&<span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace"}}>{task.owner}</span>}</div>
                  <SBadge status={task.status}/>
                </div>
                <div style={{height:8,background:"rgba(255,255,255,0.07)",borderRadius:4,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",width:p+"%",background:barC,borderRadius:4,transition:"width 0.8s ease"}}/></div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                  {[{label:"預算",val:"NT$ "+fmt(b),color:"#e2e8f0"},{label:"花費",val:"NT$ "+fmt(s),color:"#f97316"},{label:"剩餘",val:(ov?"-":"")+"NT$ "+fmt(Math.abs(r)),color:ov?"#ef4444":"#22c55e"},{label:"使用率",val:p+"%"+(ov?" !":""),color:ov?"#ef4444":p>=80?"#f97316":"#e2e8f0"}].map(({label,val,color})=>(
                    <div key={label}><div style={{fontSize:9,color:"rgba(255,255,255,0.28)",fontFamily:"monospace",marginBottom:2}}>{label}</div><div style={{fontFamily:"monospace",fontSize:11,fontWeight:600,color}}>{val}</div></div>
                  ))}
                </div>
              </div>
            );
          })}
          {twb.length>0&&(
            <div style={{padding:"12px 8px",background:"rgba(255,255,255,0.04)",borderRadius:10,marginTop:8}}>
              <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:8}}>合計</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {[{label:"總預算",val:"NT$ "+fmt(totB),color:"#e2e8f0"},{label:"花費",val:"NT$ "+fmt(totS),color:"#f97316"},{label:"剩餘",val:(over?"-":"")+"NT$ "+fmt(Math.abs(rem)),color:over?"#ef4444":"#22c55e"},{label:"使用率",val:pct+"%",color:over?"#ef4444":pct>=80?"#f97316":"#e2e8f0"}].map(({label,val,color})=>(
                  <div key={label}><div style={{fontSize:9,color:"rgba(255,255,255,0.28)",fontFamily:"monospace",marginBottom:2}}>{label}</div><div style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color}}>{val}</div></div>
                ))}
              </div>
            </div>
          )}
        </div>
      </Card>
    </div>
  );
}

// NOTES
const NOTE_COLORS=["#f5c842","#ff6b6b","#51cf66","#339af0","#cc5de8","#ff922b"];
function NotesView({notes,onSave}){
  const [view,setView]=useState("list"),[current,setCurrent]=useState(null),[search,setSearch]=useState("");
  const save=async n=>{const upd={...n,updatedAt:new Date().toISOString()};await onSave(notes.find(x=>x.id===n.id)?notes.map(x=>x.id===n.id?upd:x):[upd,...notes]);setCurrent(upd);};
  const newNote=()=>{const n={id:uid(),title:"",body:"",items:[],mode:"text",color:"#f5c842",pinned:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};setCurrent(n);setView("edit");};
  const delNote=async id=>{await onSave(notes.filter(x=>x.id!==id));setView("list");setCurrent(null);};
  const pinNote=async id=>onSave(notes.map(x=>x.id===id?{...x,pinned:!x.pinned}:x));
  const checkItem=async(nid,iid)=>{const note=notes.find(x=>x.id===nid);if(!note)return;const upd={...note,items:note.items.map(it=>it.id===iid?{...it,done:!it.done}:it),updatedAt:new Date().toISOString()};if(current?.id===nid)setCurrent(upd);await onSave(notes.map(x=>x.id===nid?upd:x));};
  const fmtD=s=>{const d=new Date(s),n=new Date(),df=Math.floor((n-d)/864e5);if(df===0)return d.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false});if(df===1)return"昨天";if(df<7)return df+" 天前";return d.toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"});};
  const prev=n=>n.mode==="checklist"?(n.items||[]).map(it=>(it.done?"v ":"o ")+it.text).join("  "):(n.body||"");
  if(view==="edit"&&current){
    const isCL=current.mode==="checklist";

      <div style={{display:"flex",flexDirection:"column",minHeight:"80vh"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button onClick={()=>setView("list")} style={{background:"none",border:"none",color:"#3b82f6",fontSize:15,cursor:"pointer"}}>返回</button>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <button onClick={()=>setF({mode:isCL?"text":"checklist"})} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,padding:"5px 10px",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer"}}>{isCL?"文字":"清單"}</button>
            <button onClick={()=>delNote(current.id)} style={{background:"none",border:"none",color:"#ef4444",fontSize:13,cursor:"pointer"}}>刪除</button>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>{NOTE_COLORS.map(c=><div key={c} onClick={()=>setF({color:c})} style={{width:22,height:22,borderRadius:"50%",background:c,border:current.color===c?"3px solid #fff":"3px solid transparent",cursor:"pointer"}}/>)}</div>
        <input value={current.title||""} onChange={e=>setF({title:e.target.value})} placeholder="標題" style={{background:"transparent",border:"none",color:"#fff",fontSize:22,fontWeight:700,fontFamily:"'Noto Sans TC',sans-serif",outline:"none",width:"100%",marginBottom:8,borderBottom:"2px solid "+(current.color||"#f5c842")+"50",paddingBottom:8}}/>
        <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.28)",marginBottom:14}}>{fmtD(current.updatedAt)+" 修改"}</div>
        {!isCL?(
          <textarea value={current.body||""} onChange={e=>setF({body:e.target.value})} placeholder="開始輸入..." style={{background:"transparent",border:"none",color:"#e2e8f0",fontSize:15,fontFamily:"'Noto Sans TC',sans-serif",outline:"none",width:"100%",resize:"none",lineHeight:1.8,minHeight:300}}/>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            {(current.items||[]).map((item,i)=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div onClick={()=>setF({items:current.items.map(it=>it.id===item.id?{...it,done:!it.done}:it)})} style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(item.done?"#22c55e":"rgba(255,255,255,0.3)"),background:item.done?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
                  {item.done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>v</span>}
                </div>
                <input value={item.text} onChange={e=>setF({items:current.items.map(it=>it.id===item.id?{...it,text:e.target.value}:it)})} placeholder={"項目 "+(i+1)} style={{flex:1,background:"transparent",border:"none",color:item.done?"rgba(255,255,255,0.35)":"#e2e8f0",fontSize:15,fontFamily:"'Noto Sans TC',sans-serif",outline:"none",textDecoration:item.done?"line-through":"none"}}/>
                <button onClick={()=>setF({items:current.items.filter(it=>it.id!==item.id)})} style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",fontSize:16,cursor:"pointer",padding:"0 4px"}}>X</button>
              </div>
            ))}
            <button onClick={()=>setF({items:[...(current.items||[]),{id:uid(),text:"",done:false}]})} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",background:"none",border:"none",color:"#3b82f6",fontSize:14,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"}}>
              <span style={{width:22,height:22,borderRadius:"50%",border:"2px solid #3b82f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>+</span>新增項目
            </button>
          </div>
        )}
      </div>
    );
  }
  const fil=notes.filter(n=>(n.title||"").toLowerCase().includes(search.toLowerCase())||(n.body||"").toLowerCase().includes(search.toLowerCase())||(n.items||[]).some(it=>(it.text||"").toLowerCase().includes(search.toLowerCase())));
  const pin=fil.filter(n=>n.pinned).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const unp=fil.filter(n=>!n.pinned).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const NC=({note,wide})=>{
    const ac=note.color||"#f5c842",isCL=note.mode==="checklist",dn=(note.items||[]).filter(it=>it.done).length,tot=(note.items||[]).length;
    return(
      <div onClick={()=>{setCurrent(note);setView("edit");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"14px 14px 10px",cursor:"pointer",borderTop:"3px solid "+ac,position:"relative"}}>
        <button onClick={e=>{e.stopPropagation();pinNote(note.id);}} style={{position:"absolute",top:10,right:10,background:"none",border:"none",fontSize:13,cursor:"pointer",color:note.pinned?"#f5c842":"rgba(255,255,255,0.2)"}}>P</button>
        {note.title&&<div style={{fontSize:14,fontWeight:700,marginBottom:5,paddingRight:24,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{note.title}</div>}
        {isCL?(
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {(note.items||[]).slice(0,wide?5:3).map(it=>(
              <div key={it.id} onClick={e=>{e.stopPropagation();checkItem(note.id,it.id);}} style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:16,height:16,borderRadius:"50%",border:"1.5px solid "+(it.done?"#22c55e":"rgba(255,255,255,0.3)"),background:it.done?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{it.done&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>v</span>}</div>
                <span style={{fontSize:12,color:it.done?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.7)",textDecoration:it.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.text||"空白"}</span>
              </div>
            ))}
            {tot>0&&<div style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{dn+"/"+tot+" 完成"}</div>}
          </div>
        ):(
          <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.5,overflow:"hidden",maxHeight:wide?60:40}}>{prev(note)||"空白備忘錄"}</div>
        )}
        <div style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:8}}>{fmtD(note.updatedAt)}</div>
      </div>
    );
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.35)"}}>{"備忘錄 "+notes.length+" 則"}</div>
        <button onClick={newNote} style={{width:34,height:34,borderRadius:"50%",background:"#3b82f6",border:"none",color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
      <div style={{position:"relative",marginBottom:14}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.3)",fontSize:14}}>S</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋備忘錄" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"10px 12px 10px 36px",color:"#e2e8f0",fontSize:14,fontFamily:"'Noto Sans TC',sans-serif",outline:"none"}}/>
      </div>
      {notes.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"rgba(255,255,255,0.2)"}}><div style={{fontSize:48,marginBottom:12}}>N</div><div style={{fontSize:14,fontWeight:500,marginBottom:6}}>尚無備忘錄</div></div>}
      {pin.length>0&&<div style={{marginBottom:14}}><div style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:8}}>置頂</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{pin.map(n=><NC key={n.id} note={n}/>)}</div></div>}
      {unp.length>0&&<div>{pin.length>0&&<div style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:8}}>其他備忘錄</div>}<div style={{display:"flex",flexDirection:"column",gap:8}}>{unp.map(n=><NC key={n.id} note={n} wide/>)}</div></div>}
    </div>
  );
}

// DASHBOARD
function DashboardView({tasks,events}){
  const td=tStr(),now=new Date();
  const total=tasks.length,bySt=Object.fromEntries(Object.keys(STATUS_MAP).map(k=>[k,tasks.filter(t=>t.status===k).length]));
  const avgP=total>0?Math.round(tasks.reduce((a,t)=>a+(t.progress||0),0)/total):0;
  const ovrd=tasks.filter(t=>t.end<td&&t.status!=="done").length;
  const dueW=tasks.filter(t=>t.end>=td&&t.end<=addD(td,7)&&t.status!=="done").length;
  const mK=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const mE=Object.keys(events).filter(k=>k.startsWith(mK)&&k!=="__recurring__").reduce((a,k)=>a+(events[k]?.length||0),0);
  const tE=(events[dKey(now.getFullYear(),now.getMonth(),now.getDate())]||[]).length;
  const totB=tasks.reduce((a,t)=>a+Number(t.budget||0),0);
  const totS=tasks.reduce((a,t)=>a+(t.expenses||[]).reduce((b,e)=>b+Number(e.amount||0),0),0);
  const bPct=totB>0?Math.min(Math.round(totS/totB*100),100):0,bOv=totS>totB&&totB>0;
  const fN=n=>Number(n||0).toLocaleString("zh-TW",{maximumFractionDigits:0});
  const SC=({icon,label,value,sub,color="#3b82f6"})=>(<Card style={{padding:14}}><div style={{fontSize:18,marginBottom:6}}>{icon}</div><div style={{fontFamily:"monospace",fontSize:24,fontWeight:700,color,lineHeight:1}}>{value}</div><div style={{fontSize:12,fontWeight:500,marginTop:4}}>{label}</div>{sub&&<div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2,fontFamily:"monospace"}}>{sub}</div>}</Card>);
  const BR=({label,val,max,color})=>(<div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12}}>{label}</span><span style={{fontFamily:"monospace",fontSize:12,color:"rgba(255,255,255,0.5)"}}>{val}</span></div><div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:(max>0?val/max*100:0)+"%",background:color,borderRadius:3,transition:"width 0.8s ease"}}/></div></div>);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        <SC icon="T" label="總任務數" value={total} sub={"平均進度 "+avgP+"%"} color="#3b82f6"/>
        <SC icon="!" label="已逾期" value={ovrd} sub={"本週到期 "+dueW+" 項"} color={ovrd>0?"#ef4444":"#22c55e"}/>
        <SC icon="C" label="今日活動" value={tE} sub={"本月共 "+mE+" 個"} color="#a855f7"/>
        <SC icon="$" label="預算使用率" value={bPct+"%"} sub={bOv?"已超支":""} color={bOv?"#ef4444":bPct>=80?"#f97316":"#22c55e"}/>
      </div>
      <Card style={{padding:16}}>
        <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:12}}>預算總覽</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
          {[{l:"總預算",v:"NT$ "+fN(totB),c:"#e2e8f0"},{l:"已花費",v:"NT$ "+fN(totS),c:"#f97316"},{l:"剩餘",v:(bOv?"-":"")+"NT$ "+fN(Math.abs(totB-totS)),c:bOv?"#ef4444":"#22c55e"}].map(({l,v,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px"}}><div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace",marginBottom:3}}>{l}</div><div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:c,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</div></div>
          ))}
        </div>
        <div style={{height:10,background:"rgba(255,255,255,0.07)",borderRadius:5,overflow:"hidden",marginBottom:6}}><div style={{height:"100%",width:bPct+"%",background:bOv?"#ef4444":bPct>=80?"#f97316":"#3b82f6",borderRadius:5,transition:"width 0.8s ease"}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.3)"}}><span>{bOv?"已超支":"已使用 "+bPct+"%"}</span><span>{tasks.filter(t=>Number(t.budget||0)>0).length+" 個項目"}</span></div>
      </Card>
      <Card style={{padding:16}}>
        <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:12}}>任務狀態</div>
        {total===0?<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:12,fontFamily:"monospace",padding:"12px 0"}}>尚無任務</div>:Object.entries(STATUS_MAP).map(([k,v])=><BR key={k} label={v.label} val={bySt[k]||0} max={total} color={v.color}/>)}
      </Card>
      <Card style={{padding:16}}>
        <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:12}}>即將到期（7天內）</div>
        {tasks.filter(t=>t.end>=td&&t.end<=addD(td,7)&&t.status!=="done").length===0
          ?<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:12,fontFamily:"monospace",padding:"12px 0"}}>近7天無到期任務</div>
          :tasks.filter(t=>t.end>=td&&t.end<=addD(td,7)&&t.status!=="done").sort((a,b)=>a.end.localeCompare(b.end)).map(t=>{const dl=dbw(td,t.end);return(
            <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{t.name}</div><div style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.32)",marginTop:2}}>{(t.owner||"無負責人")+" 進度 "+(t.progress||0)+"%"}</div></div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}><SBadge status={t.status}/><div style={{fontFamily:"monospace",fontSize:10,color:dl<=2?"#ef4444":"#f97316",marginTop:3}}>{dl===0?"今天到期":"還剩 "+dl+" 天"}</div></div>
            </div>
          );})}
      </Card>
    </div>
  );
}

// APP
function App(){
  const [tab,setTab]=useState("dashboard");
  const [events,setEvents,saveEvents,syncE,lastE,loadedE]=useShared(KEYS.CAL,{});
  const [tasks,setTasks,saveTasks,syncT,lastT,loadedT]=useShared(KEYS.GANTT,[]);
  const [cards,setCards,saveCards,syncC,lastC,loadedC]=useShared(KEYS.KANBAN,[]);
  const [notes,setNotes,saveNotes,syncN,lastN,loadedN]=useShared(KEYS.NOTES,[]);
  const syncing=syncE||syncT||syncC||syncN,allLoaded=loadedE&&loadedT&&loadedC&&loadedN;
  const lasts=[lastE,lastT,lastC,lastN].filter(Boolean),lastSync=lasts.length?lasts.reduce((a,b)=>a>b?a:b):null;
  const saveE=async v=>{setEvents(v);await saveEvents(v);};
  const saveT=async v=>{setTasks(v);await saveTasks(v);};
  const saveN=async v=>{setNotes(v);await saveNotes(v);};
  const [showBackup,setShowBackup]=useState(false),[importMsg,setImportMsg]=useState("");
  const importRef=useRef();
  const exportData=()=>{
    const data={version:1,exportedAt:new Date().toISOString(),events,tasks,cards,notes};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url;a.download="workspace-backup-"+tStr()+".json";a.click();URL.revokeObjectURL(url);
  };
  const importData=async e=>{
    const file=e.target.files?.[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      if(!data.version)throw new Error("格式錯誤");
      if(data.events){setEvents(data.events);await saveEvents(data.events);}
      if(data.tasks){setTasks(data.tasks);await saveTasks(data.tasks);}
      if(data.cards){setCards(data.cards);await saveCards(data.cards);}
      if(data.notes){setNotes(data.notes);await saveNotes(data.notes);}
      setImportMsg("匯入成功！");setTimeout(()=>{setImportMsg("");setShowBackup(false);},2500);
    }catch(err){setImportMsg("匯入失敗："+err.message);}
    e.target.value="";
  };
  const TABS=[{key:"dashboard",icon:"📊",label:"儀表板"},{key:"gantt",icon:"📋",label:"甘特圖"},{key:"budget",icon:"💰",label:"預算"},{key:"notes",icon:"📝",label:"備忘錄"},{key:"calendar",icon:"📅",label:"行事曆"}];
  return(
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}body{background:#0a0a0a;}
        input,select{color-scheme:dark;}input::placeholder{color:rgba(255,255,255,0.2);}
        input:focus,select:focus{border-color:rgba(59,130,246,0.5)!important;}
        textarea{color-scheme:dark;}textarea::placeholder{color:rgba(255,255,255,0.2);}
        ::-webkit-scrollbar{height:4px;width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
        button:active{opacity:0.75}@keyframes spin{to{transform:rotate(360deg)}}
      `}</style>
      {!allLoaded?(
        <div style={{background:"#0a0a0a",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{width:36,height:36,border:"3px solid rgba(59,130,246,0.2)",borderTop:"3px solid #3b82f6",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <div style={{fontFamily:"monospace",fontSize:12,color:"rgba(255,255,255,0.3)"}}>載入資料中...</div>
        </div>
      ):(
        <div style={{background:"#0a0a0a",minHeight:"100vh",color:"#e2e8f0",fontFamily:"'Noto Sans TC',sans-serif",display:"flex",flexDirection:"column"}}>
          <div style={{background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"13px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#3b82f6,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,boxShadow:"0 0 16px rgba(99,102,241,0.3)"}}>W</div>
              <div><div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,letterSpacing:"0.08em"}}>WorkSpace</div><div style={{fontFamily:"monospace",fontSize:9,color:"rgba(255,255,255,0.28)"}}>共同協作平台</div></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontFamily:"monospace",fontSize:10,color:syncing?"#fbbf24":"rgba(255,255,255,0.25)"}}>{syncing?"同步中...":lastSync?("v "+lastSync.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})+" 同步"):"共享模式"}</div>
              <button onClick={()=>setShowBackup(v=>!v)} style={{width:30,height:30,borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:showBackup?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.05)",color:"#e2e8f0",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>B</button>
            </div>
          </div>
          {showBackup&&(
            <div style={{background:"rgba(15,23,42,0.98)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"16px 18px",display:"flex",flexDirection:"column",gap:12,flexShrink:0}}>
              <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,0.4)"}}>資料備份與還原</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",lineHeight:1.6}}>每次 app 更新前，先匯出備份。更新後再匯入，資料不會消失。</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <button onClick={exportData} style={{padding:"12px 0",borderRadius:12,border:"1px solid rgba(59,130,246,0.4)",background:"rgba(59,130,246,0.12)",color:"#93c5fd",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:20}}>&#11015;</span><span>匯出備份</span><span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"monospace"}}>.json 檔案</span>
                </button>
                <button onClick={()=>importRef.current?.click()} style={{padding:"12px 0",borderRadius:12,border:"1px solid rgba(34,197,94,0.4)",background:"rgba(34,197,94,0.12)",color:"#86efac",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:20}}>&#11014;</span><span>匯入還原</span><span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"monospace"}}>選擇 .json</span>
                </button>
              </div>
              <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
              {importMsg&&<div style={{fontFamily:"monospace",fontSize:12,color:importMsg.includes("成功")?"#86efac":"#f87171",textAlign:"center",padding:"8px",background:"rgba(255,255,255,0.04)",borderRadius:8}}>{importMsg}</div>}
              <div style={{fontFamily:"monospace",fontSize:10,color:"rgba(255,255,255,0.2)",textAlign:"center"}}>{"任務 "+tasks.length+" · 備忘錄 "+notes.length+" 則"}</div>
            </div>
          )}
          <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",flexShrink:0}}>
            {TABS.map(t=>(
              <div key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"9px 4px",textAlign:"center",cursor:"pointer",transition:"all .15s",borderBottom:tab===t.key?"2px solid #3b82f6":"2px solid transparent",color:tab===t.key?"#93c5fd":"rgba(255,255,255,0.38)"}}>
                <div style={{fontSize:15}}>{t.icon}</div>
                <div style={{fontFamily:"monospace",fontSize:9,marginTop:1}}>{t.label}</div>
              </div>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px 32px"}}>
            {tab==="dashboard"&&<DashboardView tasks={tasks} events={events}/>}
            {tab==="gantt"&&<GanttView tasks={tasks} onSave={saveT}/>}
            {tab==="budget"&&<BudgetView tasks={tasks}/>}
            {tab==="notes"&&<NotesView notes={notes} onSave={saveN}/>}
            {tab==="calendar"&&<CalendarView events={events} onSave={saveE}/>}
          </div>
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
